<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComplianceAgent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0c0b0a;
            --surface:      #141210;
            --surface-2:    #1c1a17;
            --surface-3:    #231f16;
            --border:       rgba(200,168,75,0.14);
            --border-dim:   rgba(200,168,75,0.07);
            --gold:         #c8a84b;
            --gold-dim:     rgba(200,168,75,0.45);
            --gold-glow:    rgba(200,168,75,0.10);
            --text:         #e8e0cc;
            --text-2:       #9a9080;
            --text-3:       #524840;
            --r:            13px;
        }

        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 300; overflow: hidden; }

        /* ── App shell ─────────────────────────────────── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
        }

        /* ── Header ─────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand { display: flex; align-items: baseline; gap: 11px; }

        .brand-name {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 1.4rem;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .brand-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.75;
        }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .doc-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-3);
            letter-spacing: 0.1em;
            cursor: default;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-2);
            letter-spacing: 0.1em;
        }

        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #4ec47a;
            box-shadow: 0 0 7px #4ec47a;
            animation: blink 2.4s ease-in-out infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── Messages ────────────────────────────────────── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 3px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Welcome */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 44px 20px 28px;
            animation: rise 0.7s cubic-bezier(.16,1,.3,1) both;
        }

        .welcome-glyph {
            font-size: 2.6rem;
            margin-bottom: 18px;
            filter: sepia(1) saturate(1.5) hue-rotate(5deg) brightness(0.9);
        }

        #welcome h2 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 1.65rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }

        #welcome p {
            font-size: 0.85rem;
            color: var(--text-2);
            line-height: 1.7;
            max-width: 380px;
            margin-bottom: 26px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .chip {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            font-size: 0.73rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-2);
            cursor: pointer;
            transition: border-color .18s, color .18s, background .18s;
            letter-spacing: 0.02em;
        }

        .chip:hover {
            border-color: var(--gold-dim);
            color: var(--gold);
            background: var(--gold-glow);
        }

        /* Message row */
        .msg {
            display: flex;
            gap: 11px;
            animation: rise 0.28s cubic-bezier(.16,1,.3,1) both;
        }

        .msg.user { flex-direction: row-reverse; }

        @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .avatar {
            width: 29px; height: 29px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            font-size: 0.68rem;
        }

        .msg.user .avatar {
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--text-2);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .msg.assistant .avatar {
            background: var(--gold-glow);
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .msg-body { flex: 1; min-width: 0; }

        .bubble {
            padding: 11px 16px;
            border-radius: var(--r);
            font-size: 0.875rem;
            line-height: 1.68;
        }

        .msg.user .bubble {
            background: var(--surface-3);
            border: 1px solid rgba(200,168,75,0.1);
            color: var(--text);
            border-top-right-radius: 4px;
            max-width: 72%;
            margin-left: auto;
        }

        .msg.assistant .bubble {
            background: var(--surface);
            border: 1px solid var(--border-dim);
            border-left: 2px solid var(--gold-dim);
            color: var(--text);
            border-top-left-radius: 4px;
        }

        /* Sources */
        .sources {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 9px;
            padding-left: 2px;
        }

        .src-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 9px;
            background: var(--surface-2);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.59rem;
            color: var(--text-3);
            letter-spacing: 0.04em;
            transition: border-color .15s, color .15s;
        }

        .src-tag:hover { border-color: var(--border); color: var(--text-2); }

        .src-tag::before { content: '◆'; color: var(--gold-dim); font-size: 0.42rem; }

        /* Typing indicator */
        #typing-msg {
            display: flex;
            gap: 11px;
            animation: rise 0.28s both;
        }

        .typing-bubble {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 11px 16px;
            background: var(--surface);
            border: 1px solid var(--border-dim);
            border-left: 2px solid var(--gold-dim);
            border-radius: var(--r);
            border-top-left-radius: 4px;
        }

        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--gold-dim);
            animation: bounce 1.3s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: .18s; }
        .dot:nth-child(3) { animation-delay: .36s; }

        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

        /* Error bubble */
        .error-bubble {
            padding: 9px 13px;
            background: rgba(192,80,74,0.06);
            border: 1px solid rgba(192,80,74,0.22);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: #c0504a;
            letter-spacing: 0.02em;
        }

        /* ── Input area ──────────────────────────────────── */
        #input-area {
            padding: 14px 28px 20px;
            border-top: 1px solid var(--border-dim);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 10px 10px 18px;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrap:focus-within {
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        #question {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.875rem;
            font-weight: 300;
            resize: none;
            min-height: 22px;
            max-height: 130px;
            line-height: 1.55;
        }

        #question::placeholder { color: var(--text-3); }

        #send {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--gold);
            color: #0c0b0a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .18s, transform .15s, opacity .18s;
        }

        #send:hover:not(:disabled) { background: #d4b55c; transform: scale(1.06); }
        #send:disabled { opacity: .3; cursor: not-allowed; transform: none; }
        #send svg { width: 14px; height: 14px; }

        .hint {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.57rem;
            color: var(--text-3);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 0.07em;
        }

        /* ── Responsive ──────────────────────────────────── */
        @media (max-width: 580px) {
            header, #messages, #input-area { padding-left: 14px; padding-right: 14px; }
            .msg.user .bubble { max-width: 90%; }
        }
    </style>
</head>
<body>
<div id="app">

    <header>
        <div class="brand">
            <span class="brand-name">ComplianceAgent</span>
            <span class="brand-sub">BCB · CVM · CMN</span>
        </div>
        <div class="header-right">
            <span class="doc-count" id="doc-count" title="Documentos indexados"></span>
            <div class="status"><div class="status-dot"></div>ONLINE</div>
        </div>
    </header>

    <div id="messages">
        <div id="welcome">
            <div class="welcome-glyph">⚖️</div>
            <h2>Consultoria Regulatória</h2>
            <p>Faça perguntas sobre regulamentação do Banco Central, CVM e CMN. As respostas são fundamentadas exclusivamente nos documentos indexados.</p>
            <div class="chips">
                <button class="chip" onclick="useChip(this)">O que é política de conformidade?</button>
                <button class="chip" onclick="useChip(this)">Quais as obrigações de PLD/FT?</button>
                <button class="chip" onclick="useChip(this)">O que diz a Circular 3.978?</button>
                <button class="chip" onclick="useChip(this)">Requisitos de cibersegurança</button>
            </div>
        </div>
    </div>

    <div id="input-area">
        <div class="input-wrap">
            <textarea id="question" placeholder="Faça uma pergunta sobre regulamentação financeira..." rows="1"></textarea>
            <button id="send" onclick="send()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
                </svg>
            </button>
        </div>
        <div class="hint">ENTER para enviar &nbsp;·&nbsp; SHIFT+ENTER para nova linha</div>
    </div>

</div>
<script>
    const msgs   = document.getElementById('messages');
    const input  = document.getElementById('question');
    const btn    = document.getElementById('send');
    let loading  = false;

    // Load doc count on start
    fetch('/documents').then(r => r.json()).then(d => {
        const el = document.getElementById('doc-count');
        if (d.total > 0) el.textContent = d.total + ' DOC' + (d.total > 1 ? 'S' : '') + ' INDEXADOS';
    }).catch(() => {});

    // Auto-resize
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 130) + 'px';
    });

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function useChip(el) {
        input.value = el.textContent.trim();
        input.dispatchEvent(new Event('input'));
        send();
    }

    function scrollDown() { msgs.scrollTop = msgs.scrollHeight; }

    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function removeWelcome() {
        const w = document.getElementById('welcome');
        if (w) w.remove();
    }

    function appendUser(text) {
        removeWelcome();
        const d = document.createElement('div');
        d.className = 'msg user';
        d.innerHTML = `<div class="avatar">EU</div><div class="msg-body"><div class="bubble">${esc(text)}</div></div>`;
        msgs.appendChild(d);
        scrollDown();
    }

    function showTyping() {
        removeWelcome();
        const d = document.createElement('div');
        d.id = 'typing-msg';
        d.innerHTML = `
            <div class="avatar">⚖</div>
            <div class="msg-body">
                <div class="typing-bubble">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>`;
        msgs.appendChild(d);
        scrollDown();
    }

    function hideTyping() { const t = document.getElementById('typing-msg'); if (t) t.remove(); }

    function appendAssistant(text, sources) {
        const srcs = (sources || []).map(s => {
            const name = (s.arquivo || '').replace(/.*[\\/]/, '').replace(/\.pdf$/i, '');
            return `<span class="src-tag">${esc(name)} · p.${s.pagina}</span>`;
        }).join('');

        const d = document.createElement('div');
        d.className = 'msg assistant';
        d.innerHTML = `
            <div class="avatar">⚖</div>
            <div class="msg-body">
                <div class="bubble">${esc(text)}</div>
                ${srcs ? `<div class="sources">${srcs}</div>` : ''}
            </div>`;
        msgs.appendChild(d);
        scrollDown();
    }

    function appendError(msg) {
        hideTyping();
        const d = document.createElement('div');
        d.className = 'msg assistant';
        d.innerHTML = `<div class="avatar">⚖</div><div class="msg-body"><div class="error-bubble">⚠ ${esc(msg)}</div></div>`;
        msgs.appendChild(d);
        scrollDown();
    }

    async function send() {
        const q = input.value.trim();
        if (!q || loading) return;

        loading = true;
        btn.disabled = true;
        input.value = '';
        input.style.height = 'auto';

        appendUser(q);
        showTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pergunta: q })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            hideTyping();
            appendAssistant(data.resposta, data.fontes);
        } catch (err) {
            appendError('Não foi possível obter resposta. Verifique se o Ollama está em execução (ollama serve).');
        } finally {
            loading = false;
            btn.disabled = false;
            input.focus();
        }
    }
</script>
</body>
</html>
