services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw:/app/data/raw          # PDFs — add locally, available in container
      - ./data:/app/data                   # SQLite DB persisted
      - chroma_data:/app/chroma_db         # ChromaDB persisted
      - ./.env:/app/.env:ro                # Env vars (read-only)
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DB_PATH=data/compliance.db
      - CHROMA_DB_PATH=chroma_db
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # GPU support: uncomment below if NVIDIA GPU + nvidia-container-toolkit installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  chroma_data:
  ollama_models:
